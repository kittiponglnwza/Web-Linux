<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Quest — ผจญภัยในโลก Command Line</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <header class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="logo"> Linux Quest</a>
            <nav style="display: flex; gap: 1rem; align-items: center;">
                <div class="user-status-nav" id="nav-status">
                    <span class="badge" id="nav-rank">Loading...</span>
                    <span class="xp-text" id="nav-xp">0 XP</span>
                </div>
                <a href="profile.html" class="btn btn-secondary">โปรไฟล์</a>
            </nav>
        </div>
    </header>

    <main class="container main-layout">
        <section class="hero-section">
            <h1 class="hero-title">ฝึกสกิล Linux ให้เทพ<br>ด้วยการตะลุย <span class="highlight">Quest!</span></h1>
            <p class="hero-subtitle">
                เปลี่ยนการจำคำสั่ง Terminal ที่น่าเบื่อ ให้เป็นเกมเปิดแผนที่ ตีบอส และสะสม XP เพื่ออัปแรงก์
            </p>
            
            <div class="hero-actions">
                <a href="chapters.html" class="btn btn-primary btn-large">เริ่มเรียนเลย</a>
            </div>
        </section>

        <section class="dashboard-section">
            <div class="card status-card">
                <h3>สถานะปัจจุบันของคุณ</h3>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="label">Rank ปัจจุบัน:</span>
                        <div class="rank-display" id="home-rank">🛡️ กำลังโหลด...</div>
                    </div>
                    <div class="status-item">
                        <span class="label">XP ทั้งหมด:</span>
                        <div class="xp-display"><span id="home-xp">0</span> XP</div>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="rank-progress" style="width: 0%"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/storage.js"></script> <script src="js/ui.js"></script>      <script src="js/app.js"></script>     </body>
</html>

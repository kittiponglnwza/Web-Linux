<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ผู้ใช้งาน — Linux Quest</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .danger-zone {
            margin-top: 3rem;
            border-top: 1px dashed #ef4444;
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="logo"> Linux Quest</a>
            <nav style="display: flex; gap: 1rem; align-items: center;">
                <div class="user-status-nav" id="nav-status">
                    <span class="badge" id="nav-rank">Loading...</span>
                    <span class="xp-text" id="nav-xp">0 XP</span>
                </div>
                <a href="chapters.html" class="btn btn-secondary">แผนที่ด่าน</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 4rem; padding-bottom: 4rem;">
        <div class="profile-container">
            
            <div class="card" style="text-align: center; padding: 2.5rem 1.5rem;">
                <div style="font-size: 4rem; margin-bottom: 1rem;">🧑‍💻</div>
                <h2 style="margin-bottom: 0.5rem;">ผู้บัญชาการ Terminal</h2>
                <p id="profile-rank" class="rank-display" style="font-size: 1.5rem;">Loading...</p>
                
                <div style="margin-top: 1.5rem; text-align: left;">
                    <span style="font-size: 0.85rem; color: var(--text-muted);">ความคืบหน้าการเลื่อนแร็งค์</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="rank-progress"></div>
                    </div>
                </div>
            </div>

            <div class="stats-box">
                <div class="card" style="text-align: center;">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">คะแนน XP ทั้งหมด</p>
                    <p id="profile-xp" style="font-size: 2.2rem; font-weight: bold; color: var(--primary); margin-top: 0.5rem;">0</p>
                </div>
                <div class="card" style="text-align: center;">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">ด่านที่ปลดล็อกแล้ว</p>
                    <p id="profile-chapters" style="font-size: 2.2rem; font-weight: bold; color: var(--secondary); margin-top: 0.5rem;">1 / 10</p>
                </div>
            </div>

            <div class="danger-zone">
                <h4 style="color: #ef4444; margin-bottom: 0.5rem;">⚠️ Danger Zone</h4>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">
                    หากกดปุ่มนี้ คะแนน XP ด่านที่ปลดล็อก และประวัติการทำเควสทั้งหมดจะถูกลบออกอย่างถาวรและไม่สามารถกู้คืนได้
                </p>
                <button id="reset-game-btn" class="btn" style="background-color: #ef4444; color: #ffffff; width: 100%;">
                    ลบข้อมูลและเริ่มเกมใหม่
                </button>
            </div>

        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/modal.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. ดึงค่าจาก storage มาแปะแสดงผลในกล่องสถิติ
            const xp = getXP();
            const unlocked = getUnlockedChapters();
            
            document.getElementById('profile-xp').innerText = xp;
            document.getElementById('profile-chapters').innerText = `${unlocked.length} / 10`;
            
            // รอให้ ui.js ทำงานเสร็จแล้วดึงข้อความแร็งค์มาแสดงตรงกลางตัวใหญ่ๆ
            setTimeout(() => {
                const navRankText = document.getElementById('nav-rank').innerText;
                document.getElementById('profile-rank').innerText = navRankText;
            }, 100);

            // 2. ระบบดักจับปุ่ม Reset Game
            const resetBtn = document.getElementById('reset-game-btn');
            if (resetBtn) {
                resetBtn.addEventListener('click', async () => {
                    const confirmReset = await showAppConfirm('คุณแน่ใจใช่ไหมว่าจะลบเซฟเกมทั้งหมด? คุณจะต้องเริ่มเรียนตั้งแต่ Chapter 1 ใหม่เลยนะ!', {
                        title: 'ล้างข้อมูลทั้งหมด',
                        icon: '!',
                        confirmText: 'ล้างข้อมูล',
                        cancelText: 'ยกเลิก'
                    });
                    if (confirmReset) {
                        resetGameProgress(); // ฟังก์ชันล้างค่าใน storage.js
                        await showAppAlert('ล้างข้อมูลสำเร็จ! ระบบกำลังพากลับไปหน้าแรก', {
                            title: 'สำเร็จ',
                            icon: '✓'
                        });
                        window.location.href = 'index.html';
                    }
                });
            }
        });
    </script>
</body>
</html>
